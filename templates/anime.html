<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime | OTT Explorer</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<nav class="navbar">
  <a class="navbar-brand" href="{{ url_for('dashboard') }}">🎬 OTT Explorer</a>
  <button class="hamburger" id="ham-btn" onclick="toggleMenu()">☰</button>
  <div class="nav-links" id="nav-links">
    <a href="{{ url_for('dashboard') }}">Movies</a>
    <a href="{{ url_for('tvshows') }}">TV Shows</a>
    <a href="{{ url_for('anime') }}" class="nav-active">Anime</a>
    <a href="{{ url_for('watchlist') }}">❤ Watchlist</a>
    <a href="{{ url_for('logout') }}">Logout</a>
  </div>
</nav>

<form method="GET" action="{{ url_for('anime') }}" id="sf">
<div class="search-bar">
  <div class="ac-wrap">
    <input type="text" name="search" id="s-input" class="s-input"
           placeholder="🔍  Search anime…"
           value="{{ request.args.get('search','') }}" autocomplete="off">
    <div class="ac-dropdown" id="ac-box"></div>
  </div>
  <div class="filter-row">
    <select name="genre" class="s-select">
      <option value="">🎭 All Genres</option>
      <option value="Action">Action</option><option value="Adventure">Adventure</option>
      <option value="Comedy">Comedy</option><option value="Drama">Drama</option>
      <option value="Fantasy">Fantasy</option><option value="Horror">Horror</option>
      <option value="Romance">Romance</option><option value="Sci-Fi">Sci-Fi</option>
      <option value="Sports">Sports</option><option value="Supernatural">Supernatural</option>
      <option value="Mystery">Mystery</option>
    </select>
    <button type="submit" class="s-btn">🔍 Search</button>
  </div>
</div>
</form>

<div class="results-header">
  <h2 class="sec-title">🎌 Anime</h2>
  <span class="results-count">{{ anime|length }} found</span>
</div>

<div class="grid">
{% for a in anime %}
<div class="card">
  <a href="{{ url_for('anime_details', id=a.mal_id) }}">
    <img class="card-img" loading="lazy"
         src="{{ a.images.jpg.large_image_url if a.images and a.images.jpg and a.images.jpg.large_image_url else 'https://placehold.co/300x450/111/555?text=No+Poster' }}"
         onerror="this.src='https://placehold.co/300x450/111/555?text=No+Poster'">
  </a>
  <div class="card-body">
    <p class="card-title">{{ a.title }}</p>
    <p class="card-meta">{{ a.year or '' }}{% if a.score %} · ⭐ {{ a.score }}{% endif %}</p>
    <a href="{{ url_for('add_anime_watchlist', id=a.mal_id) }}"><button class="wl-btn">+ Watchlist</button></a>
  </div>
</div>
{% endfor %}
</div>

{% if anime|length == 0 %}
<div class="empty"><div class="empty-icon">🎌</div><h3>No anime found</h3><p>Try a different search or genre</p></div>
{% endif %}

<script>
function toggleMenu(){ document.getElementById('nav-links').classList.toggle('open'); }
var inp=document.getElementById('s-input'),box=document.getElementById('ac-box'),tmr=null;
inp.addEventListener('input',function(){
  clearTimeout(tmr);var q=this.value.trim();
  if(q.length<2){box.style.display='none';box.innerHTML='';return;}
  tmr=setTimeout(function(){
    fetch('/api/suggest?q='+encodeURIComponent(q)+'&kind=anime')
    .then(r=>r.json()).then(function(data){
      if(!data||!data.length){box.style.display='none';return;}
      box.innerHTML='';
      data.forEach(function(item){
        var d=document.createElement('div');d.className='ac-item';
        var img=item.poster?'<img src="'+item.poster+'" onerror="this.style.display=\'none\'">':'<div class="ac-no-img">?</div>';
        d.innerHTML=img+'<div><div class="ac-name">'+item.title+'</div><div class="ac-yr">'+item.year+'</div></div>';
        d.onclick=function(){inp.value=item.title;box.style.display='none';document.getElementById('sf').submit();};
        box.appendChild(d);
      });box.style.display='block';
    }).catch(function(){});
  },300);
});
document.addEventListener('click',function(e){if(!inp.contains(e.target)&&!box.contains(e.target))box.style.display='none';});
</script>
</body>
</html>
