services:
  # 1. High-Performance OTT Web Application
  - type: web
    name: ott-explorer
    env: python
    buildCommand: "pip install -r requirements.txt && flask db upgrade"
    startCommand: "gunicorn run:app"
    region: oregon
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: TMDB_API_KEY
        sync: false # User will provide their TMDB API Key in Render Dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: ott-db
          property: connectionString

# 2. Automated PostgreSQL Database Backup Store
databases:
  - name: ott-db
    plan: free
    region: oregon
    postgresMajorVersion: "15"
