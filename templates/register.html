<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | OTT Explorer</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="auth-page">
  <div class="auth-box">
    <h1>🎬 OTT Explorer</h1>
    <p class="auth-sub">Create your free account</p>
    {% if error %}<div class="err-msg">⚠ {{ error }}</div>{% endif %}
    <form method="POST">
      <div class="igroup"><label>Username</label><input type="text" name="username" placeholder="Choose a username" required></div>
      <div class="igroup"><label>Password</label><input type="password" name="password" placeholder="Choose a password" required></div>
      <button class="auth-btn" type="submit">Create Account</button>
    </form>
    <div class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Login</a></div>
  </div>
</div>
</body>
</html>
