name: OTT Explorer CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-level: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest flake8

    - name: Code Linting Analysis
      run: |
        # Stop build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings.
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Check Database Integrity & Migrations
      env:
        SECRET_KEY: test-ci-secret-key
        DATABASE_URL: sqlite:///:memory:
        TMDB_API_KEY: b8a45c0e4399cb242e0c6a486ca2542c
      run: |
        flask db init || echo "Migration directory already exists"
        flask db migrate -m "CI Migration Verification" || echo "No changes detected"

    - name: Run Application Health Check
      env:
        SECRET_KEY: health-check-secret
        DATABASE_URL: sqlite:///:memory:
        TMDB_API_KEY: b8a45c0e4399cb242e0c6a486ca2542c
      run: |
        python -c "
        from app import create_app
        app = create_app()
        client = app.test_client()
        response = client.get('/')
        assert response.status_code in [200, 302]
        print('Application factory built successfully and landing page health check passed!')
        "
